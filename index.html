<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>
</head>
<body>
    <h1>Upload Resume</h1>
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="resume">
        <button type="submit">Upload</button>
    </form>

    {% if score %}
        <h2>Score: {{ score }}%</h2>
        <h3>Skills Found:</h3>
        <ul>
        {% for skill in skills %}
            <li>{{ skill }}</li>
        {% endfor %}
        </ul>
    {% endif %}
</body>
</html>
